name: Concord News Sweep

# Runs daily at 14:00 UTC. That's 7am PDT (summer) / 6am PST (winter).
# GitHub Actions cron is UTC-only, so the local time drifts by 1 hour twice
# a year when DST flips — acceptable for a 7am "morning catch-up" job.
#
# You can also trigger it manually from the Actions tab via workflow_dispatch.
on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:

# Required so the workflow can push the updated cache JSON back to main.
permissions:
  contents: write

concurrency:
  group: concord-news-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests playwright cryptography

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Write X storage state from secret
        env:
          X_COOKIES_JSON: ${{ secrets.X_COOKIES_JSON }}
        run: |
          if [ -z "${X_COOKIES_JSON}" ]; then
            echo "::error::X_COOKIES_JSON secret is empty or missing."
            exit 1
          fi
          printf '%s' "${X_COOKIES_JSON}" > /tmp/x_storage.json
          python -c "import json; json.load(open('/tmp/x_storage.json'))"

      - name: Run RSS sweep
        run: python -m concord_news

      - name: Run X sweep
        env:
          X_STORAGE_STATE_PATH: /tmp/x_storage.json
        run: python tools/x_sweep.py

      - name: Run PulsePoint sweep
        # Hits the public-but-undocumented PulsePoint incidents endpoint for
        # ConFire (agency 07090) and writes cache/concord_news_pulsepoint.json.
        # If PulsePoint changes the endpoint, payload format, or crypto
        # recipe, this step exits non-zero → Seth gets an email from GitHub
        # Actions and can pivot before the data goes stale.
        run: python tools/pulsepoint_sweep.py

      - name: Commit and push cache updates
        # `if: always()` so RSS + X caches still land even if PulsePoint
        # broke. The PulsePoint step already failing is enough to trigger
        # the breakage email; we don't want that to also drop today's
        # RSS/X data on the floor.
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "concord-news-bot"
          git config user.email "concord-news-bot@users.noreply.github.com"

          # Loop so a missing cache file (e.g. PulsePoint sweep bombed
          # before writing) doesn't abort the whole commit.
          for f in cache/concord_news.json cache/concord_news_x.json cache/concord_news_pulsepoint.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done

          if git diff --cached --quiet; then
            echo "No cache changes — nothing to commit."
            exit 0
          fi

          git commit -m "chore(concord-news): automated sweep $(date -u +%Y-%m-%dT%H:%MZ)"
          # Rebase onto any concurrent pushes (e.g. Seth's own commits).
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"

      - name: Clean up cookies
        if: always()
        run: rm -f /tmp/x_storage.json
